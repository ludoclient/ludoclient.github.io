<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LudoClient — Статистика банов</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ludoclient/ludoclient/refs/heads/main/neon.png">
    <link rel="stylesheet" href="sss.css">
    <link rel="stylesheet" href="ssss.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
<div class="ban-stat-container">
    <div class="ban-header">
        <h1>Статистика банов</h1>
        <p class="ban-subtitle">Количество забаненных "лудиков" за последний месяц</p>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="chart-container">
        <div class="chart-title">📈 Динамика банов по античитам</div>
        <div class="bar-chart" id="barChart"></div>
    </div>

    <div class="update-time" id="updateTime"></div>
    
    <a href="/" class="back-link">← Вернуться на главную</a>
</div>

<script>
    const anticheats = [
        { name: "Valcuria", basePercent: 38, minVariance: -3, maxVariance: 12 },
        { name: "PaperPlate", basePercent: 20, minVariance: -2, maxVariance: 10 },
        { name: "NeoAC", basePercent: 16, minVariance: -2, maxVariance: 8 },
        { name: "NoHack", basePercent: 5, minVariance: -2, maxVariance: 4 }
    ];
    
    function generateRandomData() {
        return anticheats.map(ac => {
            const variance = (Math.random() * 20) - 5;
            let finalPercent = ac.basePercent + variance;
            finalPercent = Math.max(0.5, Math.min(65, finalPercent));
            return {
                name: ac.name,
                percent: parseFloat(finalPercent.toFixed(1)),
                basePercent: ac.basePercent,
                change: (finalPercent - ac.basePercent).toFixed(1)
            };
        });
    }
    
    function sortByPercent(data) {
        return [...data].sort((a, b) => b.percent - a.percent);
    }
    
    function renderStatsCards(data) {
        const grid = document.getElementById('statsGrid');
        grid.innerHTML = '';
        
        data.forEach(stat => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            const changeColor = parseFloat(stat.change) >= 0 ? 'up' : 'down';
            const changeSign = parseFloat(stat.change) >= 0 ? `↑ +${stat.change}%` : `↓ ${stat.change}%`;
            
            card.innerHTML = `
                <div class="stat-name">${stat.name}</div>
                <div class="stat-percent">${stat.percent}%</div>
                <div class="stat-change ${changeColor}">${changeSign} за месяц</div>
                <div style="margin-top: 0.8rem; font-size: 0.7rem; color: #797baa;">базовый уровень: ${stat.basePercent}%</div>
            `;
            grid.appendChild(card);
        });
    }
    
    function renderBarChart(data) {
        const chartContainer = document.getElementById('barChart');
        chartContainer.innerHTML = '';
        
        const sortedData = sortByPercent(data);
        const maxPercent = Math.max(...sortedData.map(d => d.percent), 40);
        
        sortedData.forEach(item => {
            const barWidth = (item.percent / maxPercent) * 100;
            
            const barItem = document.createElement('div');
            barItem.className = 'bar-item';
            barItem.innerHTML = `
                <div class="bar-label">${item.name}</div>
                <div class="bar-bg">
                    <div class="bar-fill" style="width: ${barWidth}%; background: linear-gradient(90deg, #ff6b6b, #c92a2a);">
                        ${item.percent}%
                    </div>
                </div>
            `;
            chartContainer.appendChild(barItem);
        });
    }
    
    function updateTimestamp() {
        const now = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        const timeStr = now.toLocaleDateString('ru-RU', options);
        document.getElementById('updateTime').innerHTML = `Данные обновлены: ${timeStr}<br>Статистика собирается через пакеты данных с тегом "ant.tst2"`;
    }
    
    function init() {
        const randomData = generateRandomData();
        renderStatsCards(randomData);
        renderBarChart(randomData);
        updateTimestamp();
        
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                const width = bar.style.width;
                bar.style.width = '0%';
                setTimeout(() => {
                    bar.style.width = width;
                }, 50);
            });
        }, 100);
    }
    
    init();
</script>
</body>
</html>
